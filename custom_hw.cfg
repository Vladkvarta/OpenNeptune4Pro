# ==============================================================================
# УПРАВЛЕНИЕ ПОДСВЕТКОЙ ЧЕРЕЗ GPIO ХОСТА (ПЛАТЫ V1.1+)
# ==============================================================================
#
# АРХИТЕКТУРНАЯ СПРАВКА:
# На платах ZNP-K1 ревизии V1.1+ управление подсветкой аппаратно отвязано от MCU (STM32)
# и перенесено на GPIO хост-процессора (Rockchip). 
# Данный модуль реализует безопасное управление через системные вызовы.
# ШИМ (диммирование) не поддерживается аппаратными ограничениями ядра Linux на этой сборке.
#
# ------------------------------------------------------------------------------
# ИНСТРУКЦИЯ ПО РАЗВЕРТЫВАНИЮ ОС (ВЫПОЛНЯТЬ ПО SSH):
# ------------------------------------------------------------------------------
#
# ШАГ 1. Установка расширения Klipper (gcode_shell_command)
# Загрузка модуля в Base64 для исключения синтаксических ошибок Python при копировании.
# Выполнить (скопировать одним блоком):
#   sudo su
#   echo "" | base64 -d > /home/mks/klipper/klippy/extras/gcode_shell_command.py
#   chown mks:mks /home/mks/klipper/klippy/extras/gcode_shell_command.py
#   systemctl restart klipper
#   exit
#
# ШАГ 2. Создание bash-скрипта управления пинами (led_control.sh)
# Выполнить от обычного пользователя (mks):
#   cat << 'EOF' > /home/mks/led_control.sh
#   #!/bin/bash
#   PIN=$1
#   STATE=$2
#   if [ ! -d /sys/class/gpio/gpio$PIN ]; then
#       echo $PIN > /sys/class/gpio/export
#       echo out > /sys/class/gpio/gpio$PIN/direction
#   fi
#   echo $STATE > /sys/class/gpio/gpio$PIN/value
#   EOF
#   chmod +x /home/mks/led_control.sh
#
# ШАГ 3. Выдача прав (sudoers) для пользователя mks
# Позволяет Klipper выполнять bash-скрипт от имени root без запроса пароля:
#   echo "mks ALL=(ALL) NOPASSWD: /home/mks/led_control.sh" | sudo tee /etc/sudoers.d/led_control
#   sudo chown root:root /etc/sudoers.d/led_control
#   sudo chmod 440 /etc/sudoers.d/led_control
#
# ШАГ 4. Интеграция в Klipper
# Убедиться, что в основном файле printer.cfg прописано подключение данного модуля:
#   [include custom_hw.cfg]
#
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. Верхний свет (Caselight) - GPIO 66
# ------------------------------------------------------------------------------
[gcode_shell_command CASELIGHT_ON]
command: /usr/bin/sudo /home/mks/led_control.sh 66 1
timeout: 2.0
verbose: True

[gcode_shell_command CASELIGHT_OFF]
command: /usr/bin/sudo /home/mks/led_control.sh 66 0
timeout: 2.0
verbose: True

[gcode_macro FLASHLIGHT_ON]
description: Включить верхний свет
gcode:
    CASELIGHT_ON

[gcode_macro FLASHLIGHT_OFF]
description: Выключить верхний свет
gcode:
    CASELIGHT_OFF

# ------------------------------------------------------------------------------
# 2. Свет экструдера (Partlight) - GPIO 79
# ------------------------------------------------------------------------------
[gcode_shell_command PARTLIGHT_ON]
command: /usr/bin/sudo /home/mks/led_control.sh 79 1
timeout: 2.0
verbose: True

[gcode_shell_command PARTLIGHT_OFF]
command: /usr/bin/sudo /home/mks/led_control.sh 79 0
timeout: 2.0
verbose: True

[gcode_macro LED_ON]
description: Включить свет головы
gcode:
    PARTLIGHT_ON

[gcode_macro LED_OFF]
description: Выключить свет головы
gcode:
    PARTLIGHT_OFF

# ------------------------------------------------------------------------------
# 3. Автоинициализация при старте
# ------------------------------------------------------------------------------
[delayed_gcode INIT_LEDS]
initial_duration: 1.0
gcode:
    FLASHLIGHT_OFF
    LED_OFF