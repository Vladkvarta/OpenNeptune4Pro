#############################################################################
#   External Config Includes
#############################################################################
[include mainsail.cfg]
[include fluidd.cfg]
[include KAMP_Settings.cfg]
[include ./KAMP/Smart_Park.cfg]
# [include ./KAMP/Line_Purge.cfg]             # Закомментировано: используем статичную линию очистки

[include custom_hw.cfg]
#[include klipper_debug.cfg]
#[include adxl.cfg]

#############################################################################
#   Base Config
#############################################################################
[mcu]
serial: /dev/ttyS0
baud: 250000
restart_method: command

[printer]
kinematics:cartesian
max_velocity: 250
max_accel: 3000
max_z_velocity: 8
max_z_accel: 120
square_corner_velocity: 3.0
minimum_cruise_ratio: 0.5

[respond]
[gcode_arcs]
[pause_resume]
[display_status]
[exclude_object]
[firmware_retraction]
[virtual_sdcard]
path: ~/printer_data/gcodes

[force_move]
enable_force_move : True

[idle_timeout]
timeout: 2100
gcode:
    TURN_OFF_HEATERS
    M84
    # Гасим свет при засыпании
    Frame_Light_OFF
    Part_Light_OFF
    M117 Принтер перешел в спящий режим

#############################################################################
#   SPI Accelerometer Config
#############################################################################    
[mcu rpi] 
serial: /tmp/klipper_host_mcu

#############################################################################
#   Input Shaper Config
#############################################################################
[input_shaper]
shaper_type_x: mzv
shaper_freq_x: 111.6
shaper_type_y: mzv
shaper_freq_y: 32.4

#############################################################################
[include user_settings.cfg]

#############################################################################

#############################################################################
# Modular Configs
#############################################################################
[include config_parts/probe_and_mesh.cfg]
[include config_parts/macro_beeper.cfg]
[include config_parts/macro_filament.cfg]
[include config_parts/macro_heaters_fans.cfg]
[include config_parts/macro_parking.cfg]
[include config_parts/macro_print_base.cfg]
[include config_parts/macro_tuning.cfg]
[include config_parts/steppers.cfg]
[include config_parts/extruder_heaters.cfg]
[include config_parts/fans_sensors.cfg]

