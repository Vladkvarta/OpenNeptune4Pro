# ===========================================================================
#   INACTIVE PROBE: OLD SENSOR (Заккомментировано)
#   Чтобы вернуться на старый датчик:
#   1. Закомментируй ВЕСЬ блок "ACTIVE PROBE: BTT EDDY" выше
#   2. Раскомментируй этот блок ниже
# ===========================================================================
# [probe]
# pin: ^PA11
# x_offset: -24.25
# y_offset: 20.45
# # z_offset сохраняется внизу printer.cfg автоматически
# speed: 6.0
# samples: 3
# samples_result: median 
# sample_retract_dist: 3.0
# samples_tolerance: 0.025
# samples_tolerance_retries: 3
# 
# [bed_mesh]
# speed: 150                
# horizontal_move_z: 5  
# mesh_min: 10,21
# mesh_max: 210,211
# probe_count: 11,11          
# algorithm: bicubic
# bicubic_tension: 0.2
# mesh_pps: 4, 4 
# fade_start: 1.0
# fade_end: 10.0 
# 
# [safe_z_home]
# home_xy_position: 141.75,97.05
# speed: 100
# z_hop: 10                 
# z_hop_speed: 5
# 
# [screws_tilt_adjust]
# # Координаты винтов с учетом смещения датчика (X: -24.25, Y: 20.45)
# screw1: 54.25, 15
# screw1_name: front left screw
# screw2: 229.25, 15
# screw2_name: front right screw
# screw3: 229.25, 185
# screw3_name: rear right screw
# screw4: 54.25, 185
# screw4_name: rear left screw
# horizontal_move_z: 10.
# speed: 150.
# screw_thread: CW-M4

#############################################################################
#   External Config Includes
#############################################################################
[include mainsail.cfg]
[include fluidd.cfg]
[include KAMP_Settings.cfg]
[include ./KAMP/Smart_Park.cfg]
[include ./KAMP/Line_Purge.cfg]

[include custom_hw.cfg]
#[include klipper_debug.cfg]
#[include adxl.cfg]

#############################################################################
#   Base Config
#############################################################################
[mcu]
serial: /dev/ttyS0
baud: 250000
restart_method: command

[printer]
kinematics:cartesian
max_velocity: 250
max_accel: 3000
max_z_velocity: 8
max_z_accel: 120
square_corner_velocity: 3.0
minimum_cruise_ratio: 0.5

[respond]
[gcode_arcs]
[pause_resume]
[display_status]
[exclude_object]
[firmware_retraction]
[virtual_sdcard]
path: ~/printer_data/gcodes

[force_move]
enable_force_move : True

[idle_timeout]
timeout: 2100
gcode:
    TURN_OFF_HEATERS
    M84
    # Гасим свет при засыпании
    Frame_Light_OFF
    Part_Light_OFF
    M117 Принтер перешел в спящий режим

#############################################################################
#   SPI Accelerometer Config
#############################################################################    
[mcu rpi] 
serial: /tmp/klipper_host_mcu

#############################################################################
#   Input Shaper Config
#############################################################################
[input_shaper]
shaper_type_x: mzv
shaper_freq_x: 111.6
shaper_type_y: mzv
shaper_freq_y: 32.4

#############################################################################
[include user_settings.cfg]

#############################################################################

#############################################################################
# Modular Configs
#############################################################################
[include config_parts/probe_and_mesh.cfg]
[include config_parts/macro_beeper.cfg]
[include config_parts/macro_filament.cfg]
[include config_parts/macro_heaters_fans.cfg]
[include config_parts/macro_parking.cfg]
[include config_parts/macro_print_base.cfg]
[include config_parts/macro_tuning.cfg]
[include config_parts/steppers.cfg]
[include config_parts/extruder_heaters.cfg]
[include config_parts/fans_sensors.cfg]

