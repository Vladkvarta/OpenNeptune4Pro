[gcode_macro M300]
gcode:
    {% set S = params.S|default(2000)|int %}
    {% set P = params.P|default(100)|int %}
    SET_PIN PIN=beeper VALUE=0.1 CYCLE_TIME={ 1.0/S if S > 0 else 1 }
    G4 P{P}
    SET_PIN PIN=beeper VALUE=0

[gcode_macro PAUSE_TUNE]
gcode:
    M300 S784 P300
    M300 S587 P600
    
[gcode_macro END_TUNE]
gcode:
    M300 S392 P250 
    M300 S494 P250 
    M300 S587 P250 
    M300 S523 P300

