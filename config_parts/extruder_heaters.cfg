
[tmc2209 extruder]
uart_pin: PC4
run_current: 0.9
interpolate: false

#############################################################################
#   Extruder Config
#############################################################################
[extruder]
step_pin: PA5
dir_pin: !PA6
enable_pin: !PA4
microsteps: 16
rotation_distance: 27.444
gear_ratio: 52:10
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
min_temp: 0
max_temp: 330
heater_pin: PA7
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: PA1
max_power: 1
max_extrude_cross_section: 5
max_extrude_only_distance: 100
max_extrude_only_velocity: 45
max_extrude_only_accel: 2000
step_pulse_duration: 0.000002

# --- Исправленный блок динамики экструдера ---
# pressure_advance: 0.02725 ; Закомментировано. Управляется через Orca Slicer
pressure_advance_smooth_time: 0.040 ; Возвращено к стандарту (было 0.02)
instantaneous_corner_velocity: 1.0 ; Возвращено к стандарту (было 5.0)

[verify_heater extruder]
max_error: 120
check_gain_time: 30
hysteresis: 10
heating_gain: 2

#############################################################################
#   Bed Heater Config
#############################################################################
[heater_bed]
heater_pin:PB10
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: PA0
max_power: 1.0
min_temp: 0
max_temp: 120 
pwm_cycle_time: 0.3

[verify_heater heater_bed]
max_error: 120
check_gain_time: 120
hysteresis: 10
heating_gain: 1

[heater_generic heater_bed_outer]
heater_pin:PC8
max_power:1.0
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin:PC2
min_temp:0
max_temp:120
pwm_cycle_time: 0.3

[verify_heater heater_bed_outer]
max_error: 600
check_gain_time:120
hysteresis: 10
heating_gain: 1
