#############################################################################
#   Print Start & End Macros
#############################################################################
[gcode_macro PRINT_START]   
variable_small_print: False
variable_outer_bed_force_activation_temp: 80
variable_force_outer_bed_heater: False
gcode:
    Frame_Light_ON
    Part_Light_ON
    G92 E0 
    G90
    BED_MESH_CLEAR    
  
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set BED_HEAT_SOAK_MINUTES = params.BED_HEAT_SOAK_MINUTES|default(0)|float %}
    {% set BED_MESH = params.BED_MESH|default('adaptive')|string %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}

    # Координаты для KAMP (передаются из слайсера)
    {% set area_start = params.AREA_START|default('0,0')|string %}
    {% set area_end = params.AREA_END|default('0,0')|string %}    
    {% set start_coords = area_start.split(',')|map('float')|list %}
    {% set end_coords = area_end.split(',')|map('float')|list %}    

    {% set center_min_x = 62.5 %}
    {% set center_min_y = 62.5 %}
    {% set center_max_x = 172.5 %}
    {% set center_max_y = 172.5 %}
    
    {% if start_coords[0] >= center_min_x and start_coords[1] >= center_min_y and end_coords[0] <= center_max_x and end_coords[1] <= center_max_y %}
      SET_GCODE_VARIABLE MACRO=PRINT_START VARIABLE=small_print VALUE=True
    {% else %}
      SET_GCODE_VARIABLE MACRO=PRINT_START VARIABLE=small_print VALUE=False 
    {% endif %}

    {% if BED_TEMP >= outer_bed_force_activation_temp %}
      SET_GCODE_VARIABLE MACRO=PRINT_START VARIABLE=force_outer_bed_heater VALUE=True
    {% else %}
      SET_GCODE_VARIABLE MACRO=PRINT_START VARIABLE=force_outer_bed_heater VALUE=False
    {% endif %}

    # ----------------------------------------------------------------------
    # ПРЕДНАГРЕВ И ИНТЕГРАЦИЯ EDDY
    # ----------------------------------------------------------------------
    # Греем сопло до 150C, чтобы размягчить пластик перед Z-homing, но без соплей
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=150
    
    # Стартуем нагрев стола (замени на M140 S{BED_TEMP}, если нет твоего кастомного макроса)
    M140 S{BED_TEMP} 
    
    CG28 ; Безопасная предварительная парковка (убедись, что макрос существует!)
    G1 X112.5 Y112.5 Z5 F6000 ; Опускаем Eddy в центр
    
    # Ждем целевую температуру стола
    M190 S{BED_TEMP}
    
    # Термостабилизация датчика и стола
    {% if BED_HEAT_SOAK_MINUTES > 0 %}
        RESPOND MSG="Waiting {BED_HEAT_SOAK_MINUTES} minutes for the bed and Eddy to settle."
        G4 P{BED_HEAT_SOAK_MINUTES * 60000}
    {% else %}
        RESPOND MSG="Warming up Eddy probe for 60 seconds..."
        G4 P60000
    {% endif %}

    # Ждем 150 градусов на экструдере для точного хоуминга
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM=145 MAXIMUM=155

    G28 Z ; ПРИНУДИТЕЛЬНАЯ точная парковка Z на рабочих температурах стола и преднагретом сопле
    # ----------------------------------------------------------------------
    
    {% if BED_MESH == 'full' %}
      # Для полной сетки вызываем напрямую базу
      _BED_MESH_CALIBRATE METHOD=scan
    {% elif BED_MESH == 'adaptive' %}
      # KAMP макрос сам построит адаптивную сетку и добавит правильные параметры
      BED_MESH_CALIBRATE METHOD=scan
    {% elif BED_MESH != 'none' %}
      BED_MESH_PROFILE LOAD={BED_MESH}
    {% endif %}

    Smart_Park
    SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=1
    
    # Финальный нагрев экструдера
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={EXTRUDER_TEMP}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={EXTRUDER_TEMP-4} MAXIMUM={EXTRUDER_TEMP+10}
    
    LINE_PURGE
    G92 E0
    G1 Z2.0 F3000
    M117 Printing...   
       
[gcode_macro PRINT_END]
gcode:
    Frame_Light_OFF
    Part_Light_OFF
    M400
    TURN_OFF_HEATERS
    
    ;# --- 1. Сброс давления и отскок ---
    G92 E0
    G91 ; Относительные координаты
    G1 E-2 F2700 ; Быстрый первичный откат
    G1 X5 Y5 F3000 ; Смещение в сторону от детали (Wipe)
    G1 E-2 F1600 ; Дополнительный откат для чистоты сопла
    
    ;# --- 2. УМНЫЙ ПОДЪЕМ НА 50 ММ ---
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    
    ;# Если до потолка больше 50 мм - поднимаем на 50. Иначе - до упора.
    {% if act_z < (max_z - 50.0) %}
        {% set z_safe = 50.0 %}
    {% else %}
        {% set z_safe = max_z - act_z %}
    {% endif %}
    
    G1 Z{z_safe} F1500 ; Сам подъем
    
    ;# --- 3. Парковка и выключение ---
    G90 ; Возврат в абсолютные координаты
    G1 X0 Y230 F6000 ; Голову влево, стол выкатываем вперед
    
    M107 ; Выключение обдува детали
    
    ;# ВАЖНО: Отключаем только моторы X, Y и Экструдера. Ось Z оставляем включенной!
    M84 X Y E 
    
    SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=0
    M117
    END_TUNE

#############################################################################
#   Pause, Resume & Cancel Macros
#############################################################################
[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
  PAUSE_TUNE
  {% set z = params.Z|default(30)|int %}
  {% if printer['pause_resume'].is_paused|int == 0 %}
      SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=etemp VALUE={printer['extruder'].target|default(220)}
      SET_GCODE_VARIABLE MACRO=LOAD_FILAMENT VARIABLE=prev_temp VALUE={printer['extruder'].target|default(220)}
      SET_GCODE_VARIABLE MACRO=UNLOAD_FILAMENT VARIABLE=prev_temp VALUE={printer['extruder'].target|default(220)}
      SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=zhop VALUE={z}
      SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=0
      SAVE_GCODE_STATE NAME=PAUSE
      BASE_PAUSE
      G91
      {% if (printer.gcode_move.position.z + z) < printer.toolhead.axis_maximum.z %}
          G1 E-2 F2700
          G1 X3 Y3 F3000
          G1 E-2 Z{z} F1600
          SAVE_GCODE_STATE NAME=ZLIFT
      {% else %}
          { action_respond_info("Pause zhop exceeds maximum Z height.") }
          SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=zhop VALUE=0
          G1 E-2 F2700
          G1 X3 Y3 F3000
          G1 E-2 F1600
          SAVE_GCODE_STATE NAME=ZLIFT
      {% endif %}
      G90
      G1 X{printer.toolhead.axis_minimum.x+5} Y{printer.toolhead.axis_maximum.y-5} F6000
      SAVE_GCODE_STATE NAME=PAUSEPARK
      SET_HEATER_TEMPERATURE HEATER=extruder TARGET=175
      SET_IDLE_TIMEOUT TIMEOUT=43200
  {% endif %}

[gcode_macro RESUME]
rename_existing: BASE_RESUME
variable_zhop: 0
variable_etemp: 0
gcode:
  {% if printer['pause_resume'].is_paused|int == 1 %}
      SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=1
      SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}
      {% if etemp > 0 %}
          SET_HEATER_TEMPERATURE HEATER=extruder TARGET={etemp|int}
          TEMPERATURE_WAIT SENSOR=extruder MINIMUM={etemp|int - 4} MAXIMUM={etemp|int + 10}
      {% endif %}
      RESTORE_GCODE_STATE NAME=PAUSEPARK MOVE=1 MOVE_SPEED=100
      G91
      M83
      G1 E80 F200
      G4 P2000
      G1 X20 F15000
      G1 X-20
      G1 X20
      G1 X-20
      G1 X20
      G1 X-20
      RESTORE_GCODE_STATE NAME=ZLIFT MOVE=1 MOVE_SPEED=60
      G1 X-3 Y-3 F3000
      G1 Z{zhop * -1} F900  
      RESTORE_GCODE_STATE NAME=PAUSE MOVE=1 MOVE_SPEED=60
      M400
      BASE_RESUME
  {% endif %}

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
  # 1. Возвращаем таймауты
  SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}
  # 2. Сброс состояния чтения и очистка очереди
  CLEAR_PAUSE
  SDCARD_RESET_FILE
  BASE_CANCEL_PRINT
  
  # 3. Выключение всех нагревов СРАЗУ
  TURN_OFF_HEATERS
  
  # 4. Безопасный подъём и отвод сопла, без глупых M400 и ретрактов "на холодную"!
  {% if printer.toolhead.homed_axes == "xyz" %}
      G91
      # Поднимаем на 10 мм
      G1 Z10 F1500
      G90
      # База вперёд, голова влево
      G1 X0 Y230 F6000
  {% endif %}
  
  # 5. Гасим всё остальное
  M107 ; Выключение обдува детали
  M84 X Y E 
  Frame_Light_OFF
  Part_Light_OFF
  SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=0
  M117 Отмена печати!
  RESPOND MSG="Печать мгновенно прервана. Нагрев отключен."

