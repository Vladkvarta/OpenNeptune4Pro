[gcode_macro EDDY_TEMP_CALIBRATE]
description: Автоматизация температурной калибровки Eddy
gcode:
    ;# Принимаем параметр TARGET (по умолчанию 55)
    {% set target_temp = params.TARGET|default(46)|int %}
    ;# Принимаем температуру нагрева стола (по умолчанию 110)
    {% set bed_temp = params.BED_TEMP|default(100)|int %}
    
    ;# 1. Вычисляем центр стола
    {% set x_center = printer.toolhead.axis_maximum.x / 2 %}
    {% set y_center = printer.toolhead.axis_maximum.y / 2 %}
    
    ;# 2. Паркуемся и едем в центр
    G28
    G90
    G0 X{x_center} Y{y_center} Z0.5 F6000
    
    ;# 3. Включаем обдув на 100% (имитация реальных условий печати)
    M106 S255
    
    ;# 4. Запускаем нагрев стола БЕЗ блокировки макроса
    M140 S{bed_temp}
    M118 [Eddy] Нагрев стола до {bed_temp}C активирован!
    M118 [Eddy] Процесс идет до {target_temp}C с шагом 4C.
    M118 [Eddy] Следуйте инструкциям (ACCEPT на каждом шаге стабилизации).
    
    ;# 5. Запускаем саму калибровку
    TEMPERATURE_PROBE_CALIBRATE PROBE=btt_eddy TARGET={target_temp} STEP=4



#############################################################################
#   Homing & Levelling Macros
#############################################################################
[gcode_macro CG28]
gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
      G28
  {% else %}
  {% endif %}

[gcode_macro Axis_Twist_Comp_Tune]
gcode:    
      CG28
      AXIS_TWIST_COMPENSATION_CALIBRATE

[gcode_macro Bed_Level_Screws_Tune]
gcode:
    BED_MESH_CLEAR
    {% set current = printer.heater_bed.target|round(0) %}
    {% set target = current or 60 %}
    {% if current == 0 %}
    RESPOND PREFIX="Bed_Level_Screws_Tune" MSG="No bed target, heating to {target} °C"
    SET_BED_TEMPERATURE TARGET={target}
    {% else %}
    RESPOND PREFIX="Bed_Level_Screws_Tune" MSG="Waiting for bed to reach {target} °C"
    {% endif %}
    BED_TEMPERATURE_WAIT MINIMUM={target - 2} MAXIMUM={target + 5}
    CG28
    SCREWS_TILT_CALCULATE

[gcode_macro Calibrate_Probe_Z_Offset]
gcode:
      CG28
      PROBE_CALIBRATE
      
[gcode_macro Auto_Full_Bed_Level]
gcode:
      RESPOND PREFIX="info" MSG="Running Custom Bed Leveling Macro"
      BED_MESH_CLEAR
      SET_BED_TEMPERATURE TARGET=60
      BED_TEMPERATURE_WAIT MINIMUM=58 MAXIMUM=65
      CG28
      BED_MESH_CALIBRATE

[gcode_macro SCREWS_CALIBRATE]
description: Калибровка винтов стола (Screws Tilt Adjust)
gcode:
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}
    SCREWS_TILT_CALCULATE

#############################################################################
#   PID Tuning Macros
#############################################################################
[gcode_macro PID_Tune_EXTRUDER]
gcode:
  {% set temperature = params.TEMPERATURE|default(210) %}
  CG28
  M106 S255
  PID_CALIBRATE HEATER=extruder TARGET={temperature}
  SAVE_CONFIG

[gcode_macro PID_Tune_BED]
gcode:
  {% set temperature = params.TEMPERATURE|default(60) %}
  CG28
  M106 S255
  PID_CALIBRATE HEATER=heater_bed TARGET={temperature}
  SAVE_CONFIG
  
[gcode_macro PID_Tune_Outer_BED]
gcode:
  {% set temperature = params.TEMPERATURE|default(60) %}
  G28
  M106 S255
  SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={temperature}
  PID_CALIBRATE HEATER=heater_bed_outer TARGET={temperature}
  SAVE_CONFIG

#############################################################################
#   Git Backup & Update Macros
#############################################################################
[gcode_shell_command pull_git]
command: bash ~/printer_data/config/git_pull.sh
timeout: 30.0
verbose: True

[gcode_macro UPDATE_FROM_GIT]
description: Обновить конфиги из GitHub
gcode:
    M117 Ожидайте, обновляю из Git...
    RESPOND MSG="Запуск загрузки конфигураций с GitHub..."
    RUN_SHELL_COMMAND CMD=pull_git
    RESPOND MSG="Обновление успешно завершено! Перезагружаемся..."
    FIRMWARE_RESTART

[gcode_shell_command push_git]
command: bash ~/printer_data/config/git_push.sh
timeout: 30.0
verbose: True

[gcode_macro BACKUP_TO_GIT]
description: Сохранить текущие конфиги из принтера в GitHub
gcode:
    M117 Создаю бэкап в Git...
    RESPOND MSG="Отправляю конфиги в GitHub..."
    RUN_SHELL_COMMAND CMD=push_git
    RESPOND MSG="Бэкап успешно сохранен в GitHub!"
