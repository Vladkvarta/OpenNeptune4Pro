
#############################################################################
#   Filament Sensor & Change Macros
#############################################################################
[filament_switch_sensor filament_sensor]
pause_on_runout: True
insert_gcode:
  M117 Insert Detected
runout_gcode:
  M117 Runout Detected
  SET_GCODE_VARIABLE MACRO=UNLOAD_FILAMENT VARIABLE=prev_temp VALUE={printer.extruder.target|int}
  UNLOAD_FILAMENT
event_delay: 3.0
pause_delay: 1.0
switch_pin: PA12

#############################################################################
#   Beeper Config
#############################################################################
[pwm_cycle_time beeper]
pin: PA2
value: 0
shutdown_value: 0
cycle_time: 0.0005

#############################################################################
#   Fan & Temp Monitoring Config
#############################################################################
[fan]
pin: PC9

[controller_fan heatbreak+mainboard_fan]
pin: PA8
fan_speed: 0.8
idle_speed: 0.5
idle_timeout: 120
shutdown_speed: 1
heater: extruder, heater_bed, heater_bed_outer
stepper: stepper_x, stepper_y, stepper_z, extruder

[temperature_sensor RockchipHost]
sensor_type: temperature_host
min_temp: 10
max_temp: 80

[temperature_sensor STM32MCU]
sensor_type: temperature_mcu
min_temp: 10
max_temp: 85

#############################################################################
#   LED / Caselight Aliases
#   ВНИМАНИЕ: На плате ZNP-K1 (V1.1+) свет управляется через GPIO Rockchip,
#   а не через MCU (STM32). Реальные команды — в custom_hw.cfg.
#   Эти макросы — просто псевдонимы для совместимости с PRINT_START/END.
#############################################################################

[gcode_macro Frame_Light_ON]
description: Включить верхний свет (Caselight GPIO 66)
gcode:
  RUN_SHELL_COMMAND CMD=CASELIGHT_ON

[gcode_macro Frame_Light_OFF]
description: Выключить верхний свет (Caselight GPIO 66)
gcode:
  RUN_SHELL_COMMAND CMD=CASELIGHT_OFF

[gcode_macro Part_Light_ON]
description: Включить свет печатающей головы (Partlight GPIO 79)
gcode:
  RUN_SHELL_COMMAND CMD=PARTLIGHT_ON

[gcode_macro Part_Light_OFF]
description: Выключить свет печатающей головы (Partlight GPIO 79)
gcode:
  RUN_SHELL_COMMAND CMD=PARTLIGHT_OFF
