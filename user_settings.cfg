###############################################################################
# Пользовательские настройки парковки для Mainsail/Fluidd макросов
# (CANCEL_PRINT, PAUSE используют эти координаты через _TOOLHEAD_PARK_PAUSE_CANCEL)
###############################################################################
[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos   : True   ; Использовать кастомные координаты парковки
variable_custom_park_x    : 10.0   ; Голова к левому краю (X)
variable_custom_park_y    : 190.0  ; Стол выкатить вперёд, НО не до предела (Y=190 < max=235)
variable_custom_park_dz   : 5.0    ; Поднять сопло на 5 мм при парковке
variable_retract          : 2.0    ; Откат при PAUSE
variable_cancel_retract   : 2.0    ; Откат при CANCEL_PRINT (было 5.0, но сопло может быть холодным)
variable_speed_retract    : 35.0   ; Скорость отката в мм/с
variable_unretract        : 2.0    ; Возврат при RESUME
variable_speed_unretract  : 35.0   ; Скорость возврата в мм/с
variable_speed_hop        : 10.0   ; Скорость подъёма Z в мм/с
variable_speed_move       : 150.0  ; Скорость перемещения в мм/с
variable_park_at_cancel   : True   ; ВКЛЮЧИТЬ парковку при CANCEL_PRINT
variable_park_at_cancel_x : 10.0   ; X при отмене
variable_park_at_cancel_y : 190.0  ; Y при отмене
variable_use_fw_retract   : False
variable_idle_timeout     : 0
gcode:
