#############################################################################
#   Подключение Eddy MCU и датчика температуры
#############################################################################
[mcu eddy]
serial: /dev/serial/by-id/usb-Klipper_rp2040_504450593075271C-if00

[temperature_sensor btt_eddy_mcu]
sensor_type: temperature_mcu
sensor_mcu: eddy
min_temp: 10
max_temp: 100

#############################################################################
#   Сетка стола (Rapid Scan)
#############################################################################
[bed_mesh]
speed: 200
horizontal_move_z: 1
mesh_min: 33, 5
mesh_max: 230, 180
probe_count: 50, 50
algorithm: bicubic
scan_overshoot: 1

#############################################################################
#   Парковка (Homing)
#############################################################################
[safe_z_home]
home_xy_position: 117.5, 117.5
speed: 100
z_hop: 10                 
z_hop_speed: 5

#############################################################################
#   Калибровка винтов стола
#############################################################################
[screws_tilt_adjust]
screw1: 32.5, 27.5
screw1_name: front left screw
screw2: 202.5, 27.5
screw2_name: front right screw
screw3: 202.5, 197.5
screw3_name: rear right screw
screw4: 32.5, 197.5
screw4_name: rear left screw
horizontal_move_z: 10.
speed: 150.
screw_thread: CW-M4

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: BED_MESH_CALIBRATE_BASE
gcode:
    # Принудительный быстрый скан для Eddy
    BED_MESH_CALIBRATE_BASE METHOD=scan SCAN_MODE=rapid {rawparams}